<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">SilkRoot</a>
  </div>
</nav>

<section class="container py-5">
  <h1 class="text-center">Contact Us</h1>

  <div class="row mt-4">

    <div class="col-md-6">

      <form>
        <label for="name">Name</label>
        <input id="name" class="form-control mb-3" required>

        <label for="email">Email</label>
        <input id="email" type="email" class="form-control mb-3" required>

        <label for="message">Message</label>
        <textarea id="message" class="form-control mb-3" required></textarea>

        <button class="btn btn-main w-100">Send Message</button>
      </form>

    </div>

    <div class="col-md-6">
      <h4>Contact Info</h4>
      <p>Email: silkroot@demo.com</p>
      <p>Phone: (555) 123-4567</p>
      <p>NYC Location</p>

    </div>

  </div>
</section>

<footer>SilkRoot 2026</footer>

</body>
</html>
